version: "3.9"

# ragai demo - production-ready POC.
# 2 services orchestrated:
#   - ragai (Next.js frontend on host port 3036)
#   - ragai-backend (FastAPI Python, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all 47 LP stacks.

services:
  ragai-backend:
    image: ghcr.io/wikolabs/ragai-backend:latest
    container_name: ragai-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - wkdemo_net

  ragai:
    image: ghcr.io/wikolabs/ragai:latest
    container_name: ragai
    restart: unless-stopped
    ports:
      - "3036:3000"
    environment:
      BACKEND_URL: "http://ragai-backend:8000"
    depends_on:
      - ragai-backend
    networks:
      - wkdemo_net

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
